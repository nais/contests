[tools]
go = "1.26.2"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "2.11.4"
"go:mvdan.cc/gofumpt" = "0.9.2"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.3.0"

[tasks.build]
description = "Build binary"
depends = ["check", "fmt"]
run = "go build -o bin/contests cmd/contests/main.go"

[tasks."build:linux"]
description = "Build linux/amd64 binary"
run = "GOOS=linux GOARCH=amd64 go build -o bin/contests cmd/contests/main.go"

[tasks.local]
description = "Run locally"
run = "go run cmd/contests/main.go --bind-address=127.0.0.1:8080"

[tasks.check]
description = "Run all checks"
depends = ["lint", "vulncheck", "verify"]

[tasks.verify]
description = "Verify module checksums"
run = "go mod verify"

[tasks.lint]
description = "Run golangci-lint (staticcheck, gosec, deadcode)"
run = "golangci-lint run ./..."

[tasks.vulncheck]
description = "Run govulncheck"
run = "govulncheck ./..."

[tasks.fmt]
description = "Format code with gofumpt"
run = "gofumpt -w ./"

[tasks.helm-lint]
description = "Lint Helm chart"
run = "helm lint --strict ./charts"
